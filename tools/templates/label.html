<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>标注工作台</title>
<link rel="stylesheet" href="/static/style.css">
<style>
.layout{display:flex;height:calc(100vh - 78px);gap:0}
.sidebar{width:280px;min-width:280px;background:#161b22;border-right:1px solid #21262d;overflow-y:auto;padding:8px 10px}
.sidebar h3{color:#58a6ff;margin:6px 0 2px;font-size:.85rem}
.sb-stats{font-size:.73rem;color:#8b949e;margin-bottom:4px;line-height:1.4}
.sb-stats span{color:#c9d1d9;font-weight:600}
.filter-bar{display:flex;gap:4px;margin:6px 0;flex-wrap:wrap}
.fbtn{padding:2px 8px;border-radius:4px;font-size:.68rem;cursor:pointer;border:1px solid #30363d;background:#21262d;color:#8b949e;transition:.12s}
.fbtn:hover{color:#c9d1d9;background:#30363d}
.fbtn.on{background:#1f6feb;border-color:#1f6feb;color:#fff}
.sel-src{width:100%;margin:2px 0 6px;padding:3px 6px;border-radius:4px;font-size:.7rem;background:#0d1117;border:1px solid #30363d;color:#c9d1d9}
.source-group{margin-bottom:2px}
.src-header{font-size:.71rem;color:#8b949e;padding:2px 5px;display:flex;justify-content:space-between;border-radius:4px}
.src-header .cnt{font-size:.66rem}
.img-row{padding:2px 5px 2px 14px;border-radius:3px;cursor:pointer;font-size:.72rem;color:#8b949e;display:flex;justify-content:space-between;transition:.1s}
.img-row:hover{background:#21262d;color:#c9d1d9}
.img-row.active{background:#1f6feb33;color:#58a6ff;font-weight:600}
.badge{font-size:.62rem;padding:1px 4px;border-radius:4px;white-space:nowrap}
.b-lbl{background:#3fb95022;color:#3fb950}
.b-unl{background:#d2992222;color:#d29922}
.main{flex:1;display:flex;flex-direction:column;background:#0d1117}
.toolbar{display:flex;align-items:center;gap:8px;padding:6px 12px;background:#161b22;border-bottom:1px solid #21262d;flex-wrap:wrap}
.toolbar .cur{flex:1;font-size:.8rem;color:#c9d1d9;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.toolbar .sc{font-size:.68rem;color:#8b949e;white-space:nowrap}
.toolbar .sc kbd{background:#21262d;border:1px solid #30363d;border-radius:3px;padding:1px 4px;font:monospace .68rem}
.btn{padding:4px 10px;border-radius:5px;font-size:.73rem;cursor:pointer;border:1px solid #30363d;background:#21262d;color:#c9d1d9;transition:.12s;white-space:nowrap}
.btn:hover{background:#30363d}
.btn.pri{background:#238636;border-color:#238636;color:#fff}.btn.pri:hover{background:#2ea043}
.btn.warn{border-color:#d29922;color:#d29922}.btn.warn:hover{background:#d2992222}
.btn.dng{border-color:#f85149;color:#f85149}.btn.dng:hover{background:#f8514922}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn.accent{background:#1f6feb22;border-color:#58a6ff;color:#58a6ff}.btn.accent:hover{background:#1f6feb33}
.canvas-wrap{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden}
canvas{cursor:crosshair;max-width:100%;max-height:100%}
.box-info{padding:5px 12px;background:#161b22;border-top:1px solid #21262d;display:flex;align-items:center;gap:8px;font-size:.76rem;color:#8b949e;min-height:32px;flex-wrap:wrap}
.sel-label{color:#c9d1d9;font-weight:600}
.prog-wrap{height:3px;background:#21262d}.prog-fill{height:100%;background:#3fb950;transition:width .3s}
.toast{position:fixed;top:20px;right:20px;z-index:999;padding:10px 18px;border-radius:6px;font-size:.85rem;background:#238636;color:#fff;opacity:0;transform:translateY(-8px);transition:.25s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}.toast.err{background:#da3633}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:20px;max-width:480px;width:90%}
.modal h3{color:#58a6ff;margin-bottom:10px}.modal p{font-size:.83rem;color:#8b949e;margin-bottom:6px;line-height:1.6}
.modal .btns{display:flex;gap:8px;margin-top:14px;justify-content:flex-end}
.label-shell{width:min(1400px,calc(100vw - 24px));margin:0 auto;padding:14px 0}
.label-shell .app-nav{margin-bottom:10px}
.layout{height:calc(100vh - 112px);border:1px solid var(--border);border-radius:8px;overflow:hidden;background:#fff}
.sidebar{background:#fff;border-right:1px solid var(--border)}
.sidebar h3{color:var(--text)}
.sb-stats,.src-header,.img-row,.toolbar .sc,.box-info{color:var(--muted)}
.sb-stats span,.toolbar .cur,.sel-label{color:var(--text)}
.fbtn{border-color:var(--border);background:#f8fafc;color:var(--muted)}
.fbtn:hover{background:#eef2ff;color:var(--text)}
.fbtn.on{background:#e8efff;border-color:#b7c9ff;color:var(--primary-dark)}
.sel-src{background:#fff;border-color:var(--border);color:var(--text)}
.img-row:hover{background:#f1f5f9;color:var(--text)}
.img-row.active{background:#e8efff;color:var(--primary-dark)}
.main{background:#f4f6fa}
.toolbar,.box-info{background:#fff;border-color:var(--border)}
.toolbar .sc kbd{background:#f1f5f9;border-color:var(--border);color:var(--text)}
.canvas-wrap{background:#e9edf4}
.modal{background:#fff;border-color:var(--border);color:var(--text)}
.modal h3{color:var(--text)}
.modal p{color:var(--muted)}
@media(max-width:700px){.layout{flex-direction:column}.sidebar{width:100%;min-width:0;max-height:200px}}
</style>
</head>
<body>
<div class="label-shell">
{% include "_nav.html" %}
<div class="prog-wrap"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
<div class="layout">
<div class="sidebar" id="sidebar">
<h3>图片列表</h3>
<div class="sb-stats" id="sbStats">加载中...</div>
<div class="filter-bar">
<button class="fbtn on" data-f="all">全部</button>
<button class="fbtn" data-f="labeled">已标注</button>
<button class="fbtn" data-f="unlabeled">待标注</button>
</div>
<div class="filter-bar" style="margin-top:2px">
<button class="fbtn on" data-b="all">框: 全部</button>
<button class="fbtn" data-b="0">0框</button>
<button class="fbtn" data-b="1-3">1-3框</button>
<button class="fbtn" data-b="4+">4+框</button>
</div>
<select class="sel-src" id="selSrc"><option value="">所有来源</option></select>
<div id="srcGroups"></div>
</div>
<div class="main">
<div class="toolbar">
<span class="cur" id="curName">-</span>
<select id="modelSel" class="select-control" title="预标注模型"></select>
<button class="btn accent" id="btnNextUnl" title="跳到下一张待标注图片">下一张待标注</button>
<span class="sc"><kbd>W</kbd>框 <kbd>A</kbd>上张 <kbd>D</kbd>下张 <kbd>1..9</kbd>类 <kbd>0</kbd>忽略 <kbd>Del</kbd>删 <kbd>Ctrl+S</kbd>存</span>
<button class="btn pri" id="btnSave">保存</button>
<button class="btn warn" id="btnBatch">批量忽略</button>
<button class="btn dng" id="btnReset">重置</button>
<button class="btn" id="btnPrev">上一张</button>
<button class="btn" id="btnNext">下一张</button>
</div><div class="canvas-wrap" id="cw"><canvas id="cvs"></canvas></div>
<div class="box-info" id="boxInfo">点击框选中 / 拖拽画新框 / 按0标记忽略</div>
</div></div>
<div class="toast" id="toast"></div>
<div class="modal-overlay" id="modalO"><div class="modal"><h3 id="modalT"></h3><p id="modalB"></p><div class="btns"><button class="btn" id="modalNo">取消</button><button class="btn pri" id="modalYes">确认</button></div></div></div>
</div>
<script>
const CS={{classes|tojson}};
const CLASS_IDS=Object.keys(CS).map(Number).sort((a,b)=>a-b);
const COLS={{class_colors|tojson}};
COLS['-1']=[120,120,120];COLS.__d=[0,180,255];
let imgs=[],gps={},ci=-1,cn='',csrc='',iw=1,ih=1,bxs=[],si=-1,sc=1;
let filter='all',srcFilter='',boxFilter='all';
let drawing=!1,resizing=!1,ds={x:0,y:0},rc='';
let undoStack=[],clipboard=null,autoSaveTimer=null;
const cvs=document.getElementById('cvs'),ctx=cvs.getContext('2d');
const sg=document.getElementById('srcGroups'),ss=document.getElementById('sbStats');
const cnE=document.getElementById('curName'),bi=document.getElementById('boxInfo');
const pf=document.getElementById('progFill'),to=document.getElementById('toast');
const mo=document.getElementById('modalO'),mt=document.getElementById('modalT'),mb=document.getElementById('modalB');
const selSrc=document.getElementById('selSrc');
let imgE=new Image,mr=null;

function st(m,e){to.textContent=m;to.className='toast show'+(e?' err':'');setTimeout(()=>to.className='toast',1800)}
function sm(t,b){mt.textContent=t;mb.innerHTML=b;mo.classList.add('show');return new Promise(r=>{mr=r})}
document.getElementById('modalNo').onclick=()=>{mo.classList.remove('show');mr&&mr(!1)}
document.getElementById('modalYes').onclick=()=>{mo.classList.remove('show');mr&&mr(!0)}

// 筛选按钮
document.querySelectorAll('.fbtn').forEach(b=>b.onclick=()=>{
if(b.dataset.f){filter=b.dataset.f;document.querySelectorAll('.fbtn[data-f]').forEach(x=>x.classList.toggle('on',x.dataset.f===filter))}
if(b.dataset.b){boxFilter=b.dataset.b;document.querySelectorAll('.fbtn[data-b]').forEach(x=>x.classList.toggle('on',x.dataset.b===boxFilter))}
rr()});
selSrc.onchange=()=>{srcFilter=selSrc.value;rr()};

function getFiltered(){
let f=imgs;
if(filter==='labeled')f=f.filter(i=>i.labeled);
if(filter==='unlabeled')f=f.filter(i=>!i.labeled);
if(srcFilter)f=f.filter(i=>(i.source||'')===srcFilter);
if(boxFilter==='0')f=f.filter(i=>(i.box_count||0)===0);
if(boxFilter==='1-3')f=f.filter(i=>{const c=i.box_count||0;return c>=1&&c<=3});
if(boxFilter==='4+')f=f.filter(i=>(i.box_count||0)>=4);
return f}

async function ll(){
const r=await fetch('/api/label/list'),d=await r.json();
imgs=d.images;gps=d.groups||{};
// 填充来源下拉
const sources=new Set();imgs.forEach(i=>{if(i.source)sources.add(i.source)});
selSrc.innerHTML='<option value="">所有来源 ('+imgs.length+')</option>';
[...sources].sort().forEach(s=>selSrc.innerHTML+='<option value="'+s+'">'+s+'</option>');
selSrc.value=srcFilter;rr();
if(getFiltered().length>0&&ci<0)nx()}

function rr(){
const fi=getFiltered();imgs.forEach((img,i)=>{img._i=i});
const sm2={};fi.forEach(img=>{const s=img.source||'未归类';(sm2[s]=sm2[s]||[]).push(img)});
const tl=fi.length,ll2=fi.filter(i=>i.labeled).length,ul=tl-ll2;
ss.innerHTML='筛选 <span>'+tl+'</span> | 已标 <span>'+ll2+'</span> | 待标 <span>'+ul+'</span>';
let h='';for(const[s,il]of Object.entries(sm2)){const lb=il.filter(i=>i.labeled).length,sss=s.length>22?s.slice(0,20)+'...':s;
h+='<div class="source-group"><div class="src-header"><span title="'+s+'">'+sss+'</span><span class="cnt">'+lb+'/'+il.length+'</span></div>';
il.forEach(img=>{const a=img._i===ci?' active':'',bd=img.labeled?'<span class="badge b-lbl">'+img.box_count+'框</span>':'<span class="badge b-unl">未标</span>';
h+='<div class="img-row'+a+'" onclick="li('+img._i+')">'+img.name+bd+'</div>'});h+='</div>'}sg.innerHTML=h||'<div style="color:#8b949e;font-size:.75rem;padding:10px">无匹配图片</div>';
const total=imgs.length,tlb=imgs.filter(i=>i.labeled).length;pf.style.width=(total>0?tlb/total*100:0)+'%'}

function up(){const tlb=imgs.filter(i=>i.labeled).length;pf.style.width=(imgs.length>0?tlb/imgs.length*100:0)+'%'}

function nx(){const fi=getFiltered();if(fi.length===0)return;let idx=ci+1;while(idx<imgs.length){if(fi.includes(imgs[idx])){li(idx);return}idx++}li(fi[0]._i)}
function nxu(){const un=imgs.filter(i=>!i.labeled);if(un.length===0){st('全部已标注');return}let start=ci+1;for(let i=0;i<imgs.length;i++){const j=(start+i)%imgs.length;if(!imgs[j].labeled){li(j);return}}}

async function li(idx){
if(idx<0||idx>=imgs.length)return;ci=idx;const img=imgs[idx];cn=img.name;csrc=img.source||'';cnE.textContent=(csrc?csrc+' / ':'')+img.name;rr();
const r=await fetch('/api/label/'+encodeURIComponent(img.name)),d=await r.json();iw=d.width;ih=d.height;bxs=d.boxes||[];si=bxs.length>0?0:-1;undoStack=[];
imgE.onload=()=>{fit();dr();startAutoSave()};imgE.src='data:image/jpeg;base64,'+d.image_b64}
function fit(){const w=document.getElementById('cw'),mw=w.clientWidth-20,mh=w.clientHeight-20;sc=Math.min(mw/iw,mh/ih,1);cvs.width=Math.floor(iw*sc);cvs.height=Math.floor(ih*sc)}
window.addEventListener('resize',()=>{fit();dr()});

function dr(){
if(!imgE.complete)return;const cw=cvs.width,ch=cvs.height;ctx.clearRect(0,0,cw,ch);ctx.drawImage(imgE,0,0,cw,ch);
bxs.forEach((b,i)=>{const cid=b.class_id,ig=cid<0,col=COLS[cid]||COLS.__d;
const x1=(b.xc-b.w/2)*cw,y1=(b.yc-b.h/2)*ch,x2=(b.xc+b.w/2)*cw,y2=(b.yc+b.h/2)*ch,ww=x2-x1,hh=y2-y1,sel=i===si;
ctx.strokeStyle='rgb('+col.join(',')+')';ctx.lineWidth=sel?3:2;if(ig)ctx.setLineDash([6,3]);ctx.strokeRect(x1,y1,ww,hh);ctx.setLineDash([]);
const nm=ig?'忽略':(CS[cid]||'?');let bg=ig?'#555':(cid===2?'#b8860b':'rgb('+col.join(',')+')');ctx.font='11px sans-serif';
const tw=ctx.measureText(nm).width+6;ctx.fillRect(x1,y1-15,tw,15);ctx.fillStyle='#fff';ctx.fillText(nm,x1+3,y1-4);
if(sel){[[x1,y1],[x2,y1],[x1,y2],[x2,y2]].forEach(([cx,cy])=>{ctx.fillStyle='#fff';ctx.fillRect(cx-4,cy-4,8,8);ctx.strokeStyle='rgb('+col.join(',')+')';ctx.strokeRect(cx-4,cy-4,8,8)})}});ubi()}

function ubi(){
if(si>=0&&si<bxs.length){const b=bxs[si],ig=b.class_id<0,nm=ig?'忽略':(CS[b.class_id]||'?');
bi.innerHTML='#'+(si+1)+' <span class="sel-label" style="color:'+(ig?'#888':'')+'">'+nm+'</span> | ('+b.xc.toFixed(3)+','+b.yc.toFixed(3)+') '+b.w.toFixed(3)+'x'+b.h.toFixed(3)+(ig?' | 不参与训练':'')}
else bi.innerHTML=bxs.length+'框 | 拖拽画框 | 按0忽略 1/2类别'}

function cnv(cx,cy){return{xc:cx/cvs.width,yc:cy/cvs.height}}
function corner(x,y,b,m){const cw=cvs.width,ch=cvs.height,x1=(b.xc-b.w/2)*cw,y1=(b.yc-b.h/2)*ch,x2=(b.xc+b.w/2)*cw,y2=(b.yc+b.h/2)*ch;const cs={tl:[x1,y1],tr:[x2,y1],bl:[x1,y2],br:[x2,y2]};for(const[k,[cx,cy]]of Object.entries(cs)){if(Math.abs(x-cx)<=m&&Math.abs(y-cy)<=m)return k}return''}
function hit(x,y){const cw=cvs.width,ch=cvs.height;for(let i=bxs.length-1;i>=0;i--){const b=bxs[i],x1=(b.xc-b.w/2)*cw,y1=(b.yc-b.h/2)*ch,x2=(b.xc+b.w/2)*cw,y2=(b.yc+b.h/2)*ch;const c=corner(x,y,b,8);if(c)return{idx:i,corner:c};if(x>=x1&&x<=x2&&y>=y1&&y<=y2)return{idx:i,corner:''}}return null}

cvs.addEventListener('mousedown',e=>{const r=cvs.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;const h=hit(mx,my);if(h&&h.corner){resizing=!0;rc=h.corner;si=h.idx;ds=cnv(mx,my);dr();return}if(h){si=h.idx;dr();return}drawing=!0;si=-1;ds=cnv(mx,my);dr()});
cvs.addEventListener('mousemove',e=>{const r=cvs.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top,now=cnv(mx,my);if(!drawing&&!resizing){const h=hit(mx,my);cvs.style.cursor=h&&h.corner?'nwse-resize':h?'move':'crosshair'}if(drawing){const x1=Math.min(ds.xc,now.xc),y1=Math.min(ds.yc,now.yc),x2=Math.max(ds.xc,now.xc),y2=Math.max(ds.yc,now.yc);dr();ctx.strokeStyle='#0f0';ctx.lineWidth=1;ctx.setLineDash([4,4]);ctx.strokeRect(x1*cvs.width,y1*cvs.height,(x2-x1)*cvs.width,(y2-y1)*cvs.height);ctx.setLineDash([]);return}if(resizing&&si>=0){const b=bxs[si],x1=b.xc-b.w/2,y1=b.yc-b.h/2,x2=b.xc+b.w/2,y2=b.yc+b.h/2;if(rc.includes('l'))b.xc=now.xc+(b.xc-x1);if(rc.includes('r'))b.xc=now.xc-(x2-b.xc);if(rc.includes('t'))b.yc=now.yc+(b.yc-y1);if(rc.includes('b'))b.yc=now.yc-(y2-b.yc);b.w=Math.max(.005,Math.abs(x2-(rc.includes('l')?now.xc:x1)));b.h=Math.max(.005,Math.abs(y2-(rc.includes('t')?now.yc:y1)));dr();return}dr()});
cvs.addEventListener('mouseup',e=>{if(drawing){const r=cvs.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top,now=cnv(mx,my);
const xc=(ds.xc+now.xc)/2,yc=(ds.yc+now.yc)/2,w=Math.abs(now.xc-ds.xc),h=Math.abs(now.yc-ds.yc);
if(w>.004&&h>.004){pushUndo();bxs.push({class_id:-1,xc,yc,w,h});si=bxs.length-1}}drawing=!1;resizing=!1;rc='';dr()});

// 右键菜单
cvs.addEventListener('contextmenu',e=>{e.preventDefault();if(si<0)return;
const r=cvs.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;
const h=hit(mx,my);if(h&&h.idx===si){showCtxMenu(e.clientX,e.clientY)}});

let ctxMenu=null;
function showCtxMenu(x,y){if(ctxMenu)ctxMenu.remove();
ctxMenu=document.createElement('div');ctxMenu.style.cssText='position:fixed;z-index:200;background:#161b22;border:1px solid #30363d;border-radius:6px;padding:4px 0;min-width:140px;font-size:.75rem;color:#c9d1d9;box-shadow:0 8px 24px rgba(0,0,0,.5)';
const classItems=CLASS_IDS.slice(0,9).map((cid,i)=>[(i+1)+' 标记为 '+CS[cid],()=>ac(cid)]);
const items=[...classItems,['-',null],['0 忽略',()=>mi()],['-',null],['复制 Ctrl+C',()=>{clipboard={xc:bxs[si].xc,yc:bxs[si].yc,w:bxs[si].w,h:bxs[si].h};st('已复制')}],['粘贴 Ctrl+V',()=>{if(clipboard){pushUndo();bxs.push({...clipboard,class_id:-1});si=bxs.length-1;dr();st('已粘贴')}}],['删除 Del',()=>dsl()]];
items.forEach(([l,fn])=>{if(l==='-'){const d=document.createElement('div');d.style.cssText='border-top:1px solid #21262d;margin:4px 0';ctxMenu.appendChild(d)}else{const d=document.createElement('div');d.textContent=l;d.style.cssText='padding:5px 14px;cursor:pointer;white-space:nowrap';d.onmouseenter=()=>d.style.background='#1f6feb';d.onmouseleave=()=>d.style.background='';d.onclick=()=>{fn();ctxMenu.remove();ctxMenu=null};ctxMenu.appendChild(d)}});
ctxMenu.style.left=x+'px';ctxMenu.style.top=y+'px';document.body.appendChild(ctxMenu);
setTimeout(()=>document.addEventListener('click',()=>{if(ctxMenu){ctxMenu.remove();ctxMenu=null}},{once:!0}),10)}

// Undo/Redo
function pushUndo(){undoStack.push(bxs.map(b=>({...b})));if(undoStack.length>50)undoStack.shift()}
function undo(){if(undoStack.length===0)return;bxs=undoStack.pop();si=bxs.length-1;dr();st('已撤销')}

// 双击创框 (CVAT风格)
cvs.addEventListener('dblclick',e=>{if(drawing||resizing)return;
const r=cvs.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;
if(!getFiltered().length)return;
if(!ds.dbl){ds.dbl={x:mx,y:my};setTimeout(()=>{ds.dbl=null},400);return}
if(!ds.dbl)return;
const p1=cnv(ds.dbl.x,ds.dbl.y),p2=cnv(mx,my);
const xc=(p1.xc+p2.xc)/2,yc=(p1.yc+p2.yc)/2,w=Math.abs(p2.xc-p1.xc),h=Math.abs(p2.yc-p1.yc);
if(w>.004&&h>.004){pushUndo();bxs.push({class_id:-1,xc,yc,w,h});si=bxs.length-1;dr()}
ds.dbl=null});

// 自动保存
function startAutoSave(){if(autoSaveTimer)clearInterval(autoSaveTimer);
autoSaveTimer=setInterval(async()=>{if(bxs.some(b=>b.class_id>=0)){
const r=await fetch('/api/label/'+encodeURIComponent(cn),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({boxes:bxs})});
const j=await r.json();imgs[ci].labeled=bxs.some(b=>b.class_id>=0);imgs[ci].box_count=j.saved;
bi.innerHTML=bi.innerHTML.replace('|','| 自动保存 |')}},5000)}

document.addEventListener('keydown',e=>{if(e.target.tagName==='INPUT'||e.target.tagName==='SELECT')return;
if(/^[1-9]$/.test(e.key)){const cid=CLASS_IDS[parseInt(e.key)-1];if(cid!==undefined){e.preventDefault();ac(cid)}}
if(e.key==='0'){e.preventDefault();mi()}
if(e.key==='w'||e.key==='W'){e.preventDefault();if(!drawing){pushUndo();drawing=!0;ds=cnv(0,0);cvs.style.cursor='crosshair'}}
if(e.key==='Delete'||e.key==='Backspace'){e.preventDefault();dsl()}
if(e.ctrlKey&&e.key==='z'){e.preventDefault();undo()}
if(e.ctrlKey&&e.key==='c'){e.preventDefault();if(si>=0){clipboard={xc:bxs[si].xc,yc:bxs[si].yc,w:bxs[si].w,h:bxs[si].h};st('已复制')}}
if(e.ctrlKey&&e.key==='v'){e.preventDefault();if(clipboard){pushUndo();bxs.push({...clipboard,class_id:-1});si=bxs.length-1;dr()}}
if((e.ctrlKey||e.metaKey)&&e.key==='s'){e.preventDefault();sv()}
if(e.key==='d'||e.key==='D'||e.key==='ArrowRight'){e.preventDefault();nx()}
if(e.key==='a'||e.key==='A'||e.key==='ArrowLeft'){e.preventDefault();pv()}
if(e.key==='Tab'){e.preventDefault();if(bxs.length>0){si=(si+1)%bxs.length;dr()}}});

function pv(){const fi=getFiltered();if(fi.length===0)return;let idx=ci-1;while(idx>=0){if(fi.includes(imgs[idx])){li(idx);return}idx--}li(fi[fi.length-1]._i)}

function ac(cid){if(si<0)return;bxs[si].class_id=cid;imgs[ci].labeled=bxs.some(b=>b.class_id>=0);rr();up();dr();st('已标注: '+(CS[cid]||'class_'+cid))}
function mi(){if(si<0)return;bxs[si].class_id=-1;imgs[ci].labeled=bxs.some(b=>b.class_id>=0);rr();up();dr();st('已标记忽略')}
function dsl(){if(si<0||si>=bxs.length)return;bxs.splice(si,1);si=Math.min(si,bxs.length-1);imgs[ci].labeled=bxs.some(b=>b.class_id>=0);rr();up();dr();st('已删除')}

async function sv(){
if(autoSaveTimer)clearInterval(autoSaveTimer);
const v=bxs.filter(b=>b.class_id>=0);
try{const r=await fetch('/api/label/'+encodeURIComponent(cn),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({boxes:bxs})});const j=await r.json();
imgs[ci].labeled=v.length>0;imgs[ci].box_count=j.saved;rr();up();st('保存 '+j.saved+' 框');nx()}catch(e){st('保存失败: '+e.message,!0)}}

async function bi2(){if(!csrc){st('无视频来源',!0);return}if(si<0){st('先选中要忽略的框',!0);return}
const b=bxs[si],z={x1:b.xc-b.w/2,y1:b.yc-b.h/2,x2:b.xc+b.w/2,y2:b.yc+b.h/2,norm:!0};
const ok=await sm('批量忽略','对视频 <b>'+csrc+'</b> 的所有帧：<br><br>删除中心点落入选中框区域的标注。<br>此操作不可撤销。');if(!ok)return;
st('处理中...');try{const r=await fetch('/api/label/batch-ignore',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({source:csrc,zone:z})});const j=await r.json();st('处理 '+j.affected_frames+' 帧，删 '+j.removed_boxes+' 框');ll();li(ci)}catch(e){st('失败: '+e.message,!0)}}

async function rst(){const ok=await sm('重置标签','确认删除 <b>'+cn+'</b> 的标签？');if(!ok)return;
await fetch('/api/label/reset/'+encodeURIComponent(cn),{method:'POST'});bxs=[];si=-1;imgs[ci].labeled=!1;rr();up();dr();st('已重置')}

document.getElementById('btnSave').onclick=sv;document.getElementById('btnNext').onclick=nx;
document.getElementById('btnPrev').onclick=pv;document.getElementById('btnBatch').onclick=bi2;document.getElementById('btnReset').onclick=rst;
document.getElementById('btnNextUnl').onclick=nxu;
// 模型切换器
(async function initModelSel(){
    const sel=document.getElementById('modelSel');
    try{
        const r=await fetch('/api/models'),d=await r.json();
        sel.innerHTML=d.available.map(m=>'<option value="'+m+'"'+(m===d.active?' selected':'')+'>'+m.replace('.pt','')+'</option>').join('');
        sel.onchange=async()=>{
            await fetch('/api/models/active',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:sel.value})});
            st('模型已切换: '+sel.value+' (下次抽帧/标注生效)');
        }
    }catch(e){sel.innerHTML='<option>yolov8n</option>'}
})();
ll();
</script>
